# ─────────────────────────────────────────────────────────────────────────────
# CI Workflow: Lint → Build → Selenium Tests
#
# Runs on every push to any branch and on every pull request.
# Two jobs run in sequence:
#   1. lint-and-build  — ESLint + npm run build
#   2. selenium-tests  — serve the built site + run pytest
#
# If job 1 fails, job 2 is skipped automatically (via `needs:`).
# ─────────────────────────────────────────────────────────────────────────────

name: CI - Lint, Build, and Selenium Tests

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

# Avoid overlapping Cursor review runs for the same PR
concurrency:
  group: cursor-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: ESLint + Production Build
  # ───────────────────────────────────────────────────────────────────────────
  lint-and-build:
    name: ESLint + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portfolio/package-lock.json

      - name: Install Node dependencies
        run: npm install
        working-directory: portfolio

      - name: Run ESLint
        # Catches syntax errors and code quality issues before building
        run: npm run lint
        working-directory: portfolio

      - name: Build React app (production)
        # Catches compilation errors; output goes to portfolio/build/
        run: npm run build
        working-directory: portfolio

      - name: Upload build artifact
        # Share the build with the next job so we don't build twice
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: portfolio/build/

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Serve the built site and run Selenium tests
  # ───────────────────────────────────────────────────────────────────────────
  selenium-tests:
    name: Selenium Tests
    runs-on: ubuntu-latest
    needs: lint-and-build  # only runs if Job 1 succeeded

    steps:
      - name: Checkout code
        # Needed to access the tests/ directory
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: portfolio/build/

      - name: Set up Node.js (for serve)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install serve (static file server)
        run: npm install -g serve

      - name: Serve built React app in background
        # `serve` starts a zero-config static server in ~1 second.
        # We use the production build (not `npm start`) to match what S3 serves.
        # The `&` runs it as a background process; the job continues immediately.
        run: serve -s portfolio/build -l 3000 &

      - name: Wait for server to be ready
        # Poll until the server responds (up to 30 seconds).
        # Using curl retry is more reliable than a fixed sleep.
        run: |
          for i in {1..15}; do
            curl -s http://localhost:3000 > /dev/null && echo "Server ready" && break
            echo "Waiting for server... attempt $i/15"
            sleep 2
          done

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: pip install -r tests/requirements.txt

      - name: Install Chrome (headless-compatible)
        # browser-actions/setup-chrome installs a pinned Chrome build on the
        # runner. Ubuntu runners no longer ship Chrome pre-installed (as of 2024).
        # selenium-manager (bundled in Selenium 4.6+) locates this Chrome
        # automatically — no webdriver-manager or manual chromedriver needed.
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium tests
        # -v gives verbose output so each test name appears in the Actions log.
        # The BASE_URL in test_portfolio.py defaults to http://localhost:3000.
        # selenium-manager auto-resolves ChromeDriver at runtime.
        run: pytest tests/test_portfolio.py -v

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: Cursor AI Code Review (runs only on pull requests)
  # ───────────────────────────────────────────────────────────────────────────
  cursor-review:
    name: Analyze PR with Cursor
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute PR diff (git)
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          git fetch origin "$BASE_REF" "$HEAD_REF" --no-tags
          git diff --patch "origin/$BASE_REF...origin/$HEAD_REF" > pr.diff
          echo "Diff bytes: $(wc -c < pr.diff || echo 0)"

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"
          cursor-agent --version

      - name: Guardrails (secret & diff size)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "no_api_key" > skip_reason.txt
            {
              echo "## Cursor Code Review"
              echo
              echo "> Skipped automated analysis: no_api_key (fork PRs cannot access repo secrets)."
              echo
              echo "**Totals**: 0 blocker(s), 0 major(s), 0 minor(s)"
              echo
              echo "BLOCKERS: 0 | MAJORS: 0 | MINORS: 0"
            } > review.txt
            exit 0
          fi

          BYTES=$(wc -c < pr.diff || echo 0)
          if [ "$BYTES" -eq 0 ]; then
            echo "empty_diff" > skip_reason.txt
            {
              echo "## Cursor Code Review"
              echo
              echo "> Skipped automated analysis: empty_diff"
              echo
              echo "**Totals**: 0 blocker(s), 0 major(s), 0 minor(s)"
              echo
              echo "BLOCKERS: 0 | MAJORS: 0 | MINORS: 0"
            } > review.txt
            exit 0
          fi

          MAX=300000
          if [ "$BYTES" -gt "$MAX" ]; then
            head -c $MAX pr.diff > pr.diff.trim && mv pr.diff.trim pr.diff
            echo "::notice:: Diff truncated to $MAX bytes."
          fi

      - name: Build prompt file
        run: |
          if [ -f review.txt ]; then
            echo "Analysis skipped earlier; not building prompt."
            exit 0
          fi

          cat > prompt.txt <<'PROMPT'
          You are a strict senior code reviewer.
          Produce **GitHub-flavored Markdown** with the sections below and concise bullets.
          ALSO append a one-line counts footer at the VERY END in this EXACT format:
          BLOCKERS: <n> | MAJORS: <n> | MINORS: <n>

          Sections:
          ## Summary
          - Brief overview of what changed

          ## Blockers (must-fix before merge)
          - For each: file:line(s), issue, why it's a problem
          - **Proposed fix** with a minimal fenced code snippet

          ## Major Issues
          - Same details + fix snippet

          ## Minor / Nits
          - Same details + fix snippet where useful

          ## Tests
          - Missing/impacted tests + example cases

          ## Security & Performance (only if applicable)
          - Concrete risk/impact + focused fix snippet

          Analyze this Git diff:
          <DIFF>
          PROMPT

          cat pr.diff >> prompt.txt
          echo '</DIFF>' >> prompt.txt
          wc -c prompt.txt || true

      - name: Run Cursor (text)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -f review.txt ]; then
            echo "Skipping cursor-agent run (analysis previously skipped)."
            exit 0
          fi
          cursor-agent --print --output-format text --yolo -p "$(cat prompt.txt)" > review.txt

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh -R "${{ github.repository }}" pr comment "${{ github.event.pull_request.number }}" --body-file review.txt

      - name: Upload findings artifact
        uses: actions/upload-artifact@v4
        with:
          name: cursor-findings
          path: |
            review.txt
            prompt.txt
            pr.diff
            skip_reason.txt

